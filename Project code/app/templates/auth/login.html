{% extends "base.html" %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-16 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="glass-card rounded-[2rem] border border-slate-800 p-10 shadow-soft">
            <div class="space-y-4 text-center">
                <h2 class="text-3xl font-extrabold text-white">Sign in to your account</h2>
                <p class="text-slate-400">Or <a href="{{ url_for('auth.register', user_type='donor') }}" class="text-amber-300 hover:text-amber-200">create a new account</a>.</p>
            </div>
            <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
                <div class="space-y-4 rounded-3xl bg-slate-950/90 p-6 border border-slate-800">
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-200 mb-2">Email address</label>
                        <input id="email" name="email" type="email" required class="appearance-none rounded-3xl block w-full px-4 py-3 border border-slate-700 bg-slate-950/90 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 sm:text-sm" placeholder="Email address">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-200 mb-2">Password</label>
                        <input id="password" name="password" type="password" required class="appearance-none rounded-3xl block w-full px-4 py-3 border border-slate-700 bg-slate-950/90 text-slate-100 placeholder-slate-500 focus:outline-none focus:border-amber-400 focus:ring-2 focus:ring-amber-400/20 sm:text-sm" placeholder="Password">
                    </div>
                </div>
                <div class="flex items-center justify-between text-sm text-slate-300">
                    <div class="flex items-center gap-2">
                        <input id="remember_me" name="remember_me" type="checkbox" class="h-4 w-4 rounded border-slate-600 bg-slate-950 text-amber-400 focus:ring-amber-400">
                        <label for="remember_me">Remember me</label>
                    </div>
                    <a href="#" class="text-amber-300 hover:text-amber-200">Forgot your password?</a>
                </div>
                <div>
                    <button type="submit" class="w-full rounded-full bg-gradient-to-r from-fuchsia-500 to-orange-400 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-fuchsia-500/20 hover:opacity-95">Sign in</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
