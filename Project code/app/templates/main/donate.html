{% extends "base.html" %}

{% block content %}
<div class="py-20">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="glass-card rounded-[2rem] border border-slate-800 p-10 shadow-soft">
            <div class="text-center">
                <p class="text-sm uppercase tracking-[0.3em] text-amber-300">Give your time</p>
                <h2 class="mt-3 text-4xl font-bold text-white">Donate Blood</h2>
                <p class="mt-4 text-slate-400">Your donation can save lives. Please fill out the form below to record your donation.</p>
            </div>
            <div class="mt-12">
                <form action="{{ url_for('main.record_donation') }}" method="POST" class="space-y-6">
                    <div>
                        <label for="blood_type" class="block text-sm font-semibold text-slate-200 mb-2">Blood Type</label>
                        <select id="blood_type" name="blood_type" required class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm">
                            <option value="">Select blood type</option>
                            {% for blood_type in ['A+', 'A-', 'B+', 'B-', 'AB+', 'AB-', 'O+', 'O-'] %}
                            <option value="{{ blood_type }}">{{ blood_type }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div>
                        <label for="units" class="block text-sm font-semibold text-slate-200 mb-2">Units Donated</label>
                        <input type="number" name="units" id="units" min="1" max="2" value="1" required class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder-slate-500 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm">
                    </div>
                    <div>
                        <label for="donation_date" class="block text-sm font-semibold text-slate-200 mb-2">Donation Date</label>
                        <input type="datetime-local" name="donation_date" id="donation_date" required class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm">
                    </div>
                    <div>
                        <label for="notes" class="block text-sm font-semibold text-slate-200 mb-2">Additional Notes</label>
                        <textarea id="notes" name="notes" rows="3" class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder-slate-500 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm"></textarea>
                    </div>
                    <div>
                        <button type="submit" class="w-full rounded-full bg-gradient-to-r from-fuchsia-500 to-orange-400 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-fuchsia-500/20 hover:opacity-95">Record Donation</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
