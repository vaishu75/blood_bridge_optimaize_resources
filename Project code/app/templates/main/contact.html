{% extends "base.html" %}
{% block content %}
<div class="py-20">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="grid gap-12 lg:grid-cols-2">
            <div class="glass-card rounded-[2rem] border border-slate-800 p-10 shadow-soft">
                <p class="text-sm uppercase tracking-[0.3em] text-amber-300">Need help?</p>
                <h1 class="mt-4 text-4xl font-bold text-white">We’re here for you.</h1>
                <p class="mt-5 text-slate-300">Ask questions, request support, or reach out with feedback. Our team is ready to help donors, hospitals, and partners.</p>
                <div class="mt-8 space-y-4 text-slate-300">
                    <div class="rounded-3xl bg-slate-950/90 p-5">
                        <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Email</p>
                        <p class="mt-2 text-white">support@lifelink.com</p>
                    </div>
                    <div class="rounded-3xl bg-slate-950/90 p-5">
                        <p class="text-sm uppercase tracking-[0.3em] text-slate-400">Phone</p>
                        <p class="mt-2 text-white">+1 (555) 123-4567</p>
                    </div>
                </div>
            </div>
            <div class="glass-card rounded-[2rem] border border-slate-800 p-10 shadow-soft">
                <form class="space-y-6">
                    <div>
                        <label for="name" class="block text-sm font-semibold text-slate-200 mb-2">Name</label>
                        <input type="text" id="name" class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder-slate-500 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm" required>
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-200 mb-2">Email</label>
                        <input type="email" id="email" class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder-slate-500 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm" required>
                    </div>
                    <div>
                        <label for="message" class="block text-sm font-semibold text-slate-200 mb-2">Message</label>
                        <textarea id="message" rows="5" class="block w-full rounded-3xl border border-slate-700 bg-slate-950/90 px-4 py-3 text-slate-100 placeholder-slate-500 focus:border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-400/20 sm:text-sm" required></textarea>
                    </div>
                    <button type="submit" class="w-full rounded-full bg-gradient-to-r from-fuchsia-500 to-orange-400 px-6 py-3 text-base font-semibold text-white shadow-lg shadow-fuchsia-500/20 hover:opacity-95">Send Message</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
